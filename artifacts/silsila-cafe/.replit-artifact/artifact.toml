kind = "web"
previewPath = "/"
title = "Silsila Café"
version = "1.0.0"
id = "artifacts/silsila-cafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19213

[services.development]
run = "pnpm --filter @workspace/silsila-cafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/silsila-cafe", "run", "build" ]
publicDir = "artifacts/silsila-cafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19213"
BASE_PATH = "/"
